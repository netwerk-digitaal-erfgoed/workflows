name: Release Please

on:
  workflow_call:
    inputs:
      sync-changelog:
        description: 'Whether to sync CHANGELOG.md into the Bikeshed spec'
        type: boolean
        default: true
    secrets:
      token:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.token }}

  sync-changelog:
    runs-on: ubuntu-latest
    if: inputs.sync-changelog && startsWith(github.ref, 'refs/heads/release-please--branches--main')
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.token }}

      - name: Fetch sync script
        run: curl -fsSL https://raw.githubusercontent.com/netwerk-digitaal-erfgoed/workflows/main/scripts/sync-changelog.mjs -o sync-changelog.mjs

      - name: Sync changelog to spec
        run: |
          node sync-changelog.mjs
          if git diff --quiet; then
            echo "No changes"
          else
            git config user.name "nde-bot"
            git config user.email "239601817+nde-bot@users.noreply.github.com"
            git add -A
            git commit -m "chore: sync changelog to spec"
            git push
          fi
