name: Release Please

on:
  workflow_call:
    inputs:
      sync-changelog:
        description: 'Whether to sync CHANGELOG.md into the Bikeshed spec'
        type: boolean
        default: true
      working-directory:
        description: 'Directory containing the spec files (version.txt, CHANGELOG.md, index.bs)'
        type: string
        default: '.'
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

  sync-changelog:
    runs-on: ubuntu-latest
    if: inputs.sync-changelog && startsWith(github.ref, 'refs/heads/release-please--branches--main')
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync changelog to spec
        id: sync
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ ! -f CHANGELOG.md ]; then echo "No CHANGELOG.md, skipping"; exit 0; fi
          curl -fsSL https://raw.githubusercontent.com/netwerk-digitaal-erfgoed/workflows/main/scripts/sync-changelog.mjs | node --input-type=module
          if git diff --quiet; then
            echo "No changes"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit synced changelog
        if: steps.sync.outputs.has-changes == 'true'
        uses: grafana/github-api-commit-action@v1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: sync changelog to spec"
          stage-all-files: true
